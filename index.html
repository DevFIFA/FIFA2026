<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIFA World Cup 2026 Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="overlay">
    <h1>FIFA WORLD CUP 2026</h1>
    <p>104 Matches • 16 Cities • 3 Countries</p>

    <div id="countdown"></div>

    <input
      id="search"
      placeholder="Search team, city, venue..."
    >
  </div>
</header>

<section class="stats">
  <div class="card">
    <h2 id="matchCount">104</h2>
    <span>Matches</span>
  </div>

  <div class="card">
    <h2>16</h2>
    <span>Host Cities</span>
  </div>

  <div class="card">
    <h2>48</h2>
    <span>Teams</span>
  </div>
</section>

<section>
  <h2>Schedule</h2>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Stage</th>
          <th>Home</th>
          <th>Away</th>
          <th>Venue</th>
        </tr>
      </thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>
</section>

<footer>
  Updated automatically every 6 hours
</footer>

<script src="script.js"></script>

</body>
</html>
</html>
