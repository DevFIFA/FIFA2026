<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIFA 2026 Live Tracker</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<header class="hero">
  <h1>FIFA WORLD CUP 2026</h1>
  <p>Live Schedule • Auto Updated Every 6 Hours</p>

  <div id="globalCountdown"></div>

  <input id="search" placeholder="Search team, city, stadium...">
  
  <div class="filters">
    <select id="stageFilter">
      <option value="">All Stages</option>
      <option>Group</option>
      <option>Round</option>
      <option>Quarter</option>
      <option>Semi</option>
      <option>Final</option>
    </select>

    <select id="cityFilter">
      <option value="">All Cities</option>
    </select>
  </div>
</header>

<section class="stats">
  <div class="card"><h2 id="matchCount">0</h2><span>Matches</span></div>
  <div class="card"><h2>16</h2><span>Cities</span></div>
  <div class="card"><h2>48</h2><span>Teams</span></div>
</section>

<section class="container">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Match</th>
        <th>Venue</th>
        <th>Time Left</th>
      </tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</section>

<footer>
  Live FIFA Tracker • Powered by GitHub Pages + Actions
</footer>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
